<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - PC Gamer Store</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> Inicio</a></li>
                    <li><a href="productos.html"><i class="fas fa-desktop"></i> Productos</a></li>
                    <li><a href="contacto.html"><i class="fas fa-envelope"></i> Contacto</a></li>
                    <li><a href="registro.html"><i class="fas fa-user-plus"></i> Registro</a></li>
                    <li><a href="carrito.html" class="cart-icon active"><i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="cart-page">
        <h1><i class="fas fa-shopping-cart"></i> Tu Carrito de Compras</h1>
        
        <div class="cart-container">
            <div id="cart-items" class="cart-items">
                <!-- Los items se cargarán dinámicamente con JavaScript -->
                <div class="empty-cart">
                    <i class="fas fa-shopping-cart"></i>
                    <h2>Tu carrito está vacío</h2>
                    <p>¡Explora nuestros productos y encuentra lo que necesitas!</p>
                    <a href="productos.html" class="btn">Ver Productos</a>
                </div>
            </div>
            
            <div id="cart-summary" class="cart-summary" style="display: none;">
                <!-- El resumen se cargará dinámicamente con JavaScript -->
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PC Gamer Store. Todos los derechos reservados.</p>
            <div class="social-links">
                <a href="#" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
                <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" aria-label="Discord"><i class="fab fa-discord"></i></a>
                <a href="#" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
                <a href="#" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/cart.js"></script>
</body>
</html>
