<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página No Encontrada - PC Gamer Store</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .error-page {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 3rem 1rem;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: #e94560;
            margin: 0;
            line-height: 1;
            text-shadow: 0 4px 20px rgba(233, 69, 96, 0.3);
        }

        .error-icon {
            font-size: 5rem;
            color: #e94560;
            margin-bottom: 1rem;
        }

        .error-title {
            font-size: 2rem;
            color: #fff;
            margin: 1rem 0;
        }

        .error-message {
            font-size: 1.1rem;
            color: #b8c1ec;
            max-width: 500px;
            margin-bottom: 2rem;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-primary {
            background-color: #e94560;
            color: white;
            padding: 1rem 2rem;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background-color: #ff6b81;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: transparent;
            color: #e94560;
            padding: 1rem 2rem;
            border-radius: 4px;
            text-decoration: none;
            border: 2px solid #e94560;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-secondary:hover {
            background-color: #e94560;
            color: white;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 5rem;
            }

            .error-icon {
                font-size: 3rem;
            }

            .error-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> Inicio</a></li>
                    <li><a href="productos.html"><i class="fas fa-desktop"></i> Productos</a></li>
                    <li><a href="contacto.html"><i class="fas fa-envelope"></i> Contacto</a></li>
                    <li><a href="registro.html"><i class="fas fa-user-plus"></i> Registro</a></li>
                    <li><a href="carrito.html" class="cart-icon"><i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="error-page">
            <div class="error-icon">
                <i class="fas fa-gamepad"></i>
            </div>
            <h1 class="error-code">404</h1>
            <h2 class="error-title">¡Página No Encontrada!</h2>
            <p class="error-message">
                Parece que te perdiste en el camino. La página que buscas no existe o ha sido movida a otra ubicación.
            </p>
            <div class="error-actions">
                <a href="index.html" class="btn-primary">
                    <i class="fas fa-home"></i> Volver al Inicio
                </a>
                <a href="productos.html" class="btn-secondary">
                    <i class="fas fa-desktop"></i> Ver Productos
                </a>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PC Gamer Store. Todos los derechos reservados.</p>
            <div class="social-links">
                <a href="#" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
                <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" aria-label="Discord"><i class="fab fa-discord"></i></a>
                <a href="#" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
                <a href="#" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </footer>
    <script src="js/cart.js"></script>
</body>
</html>
